# GitHub Actions release workflow for AnyVim
#
# Triggered by pushing a version tag (e.g. v1.1).
# Builds, signs, notarizes, and creates a GitHub Release with a .dmg attached.
#
# Required GitHub Actions secrets:
#   CERTIFICATE_P12         — base64-encoded Developer ID Application certificate (.p12)
#   CERTIFICATE_PASSWORD    — password protecting the .p12 file
#   APPLE_ID                — Apple ID email used for notarization (e.g. you@example.com)
#   APPLE_TEAM_ID           — Apple Developer Team ID (e.g. 758YPU2N3M)
#   APP_SPECIFIC_PASSWORD   — app-specific password generated at appleid.apple.com

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-sign-notarize-release:
    name: Build, Sign, Notarize, Release
    runs-on: macos-15

    env:
      KEYCHAIN_NAME: build.keychain
      KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
      ARCHIVE_PATH: ${{ runner.temp }}/AnyVim.xcarchive
      EXPORT_PATH: ${{ runner.temp }}/export
      NOTARIZE_ZIP: ${{ runner.temp }}/AnyVim-notarize.zip
      DMG_PATH: ${{ runner.temp }}/AnyVim.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.3
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          P12_FILE="$(mktemp /tmp/cert.XXXXXX.p12)"
          echo "$CERTIFICATE_P12" | base64 --decode > "$P12_FILE"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 7200 "$KEYCHAIN_NAME"
          security default-keychain -s "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME" $(security list-keychains -d user | tr -d '"')

          security import "$P12_FILE" \
            -k "$KEYCHAIN_NAME" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_NAME"

          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          rm -f "$P12_FILE"

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project AnyVim.xcodeproj \
            -scheme AnyVim

      - name: Build archive
        run: |
          xcodebuild archive \
            -project AnyVim.xcodeproj \
            -scheme AnyVim \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=758YPU2N3M \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_NAME"

      - name: Export archive
        run: |
          cat > /tmp/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>758YPU2N3M</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          APP_BUNDLE="$EXPORT_PATH/AnyVim.app"

          # Create zip for notarytool submission
          ditto -c -k --keepParent "$APP_BUNDLE" "$NOTARIZE_ZIP"

          # Submit and wait for notarization result
          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --wait

          # Staple the notarization ticket to the .app
          xcrun stapler staple "$APP_BUNDLE"

      - name: Create DMG
        run: |
          bash scripts/create-dmg.sh "$EXPORT_PATH/AnyVim.app" "$DMG_PATH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/AnyVim.dmg
          generate_release_notes: true

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_NAME" || true
